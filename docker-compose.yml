version: '3.8'

services:
  # ==================== 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: nvs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-nvs_root_2026}
      MYSQL_DATABASE: ${DB_NAME:-nvs}
      MYSQL_USER: ${DB_USER:-nvs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nvs_pass_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ==================== 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: nvs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ==================== Go 后端 ====================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nvs-server
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-nvs_user}
      DB_PASSWORD: ${DB_PASSWORD:-nvs_pass_2026}
      DB_NAME: ${DB_NAME:-nvs}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NOVEL_DATA_DIR: /data/novels
      UPLOAD_DIR: /data/uploads
    ports:
      - "8080:8080"
    volumes:
      - novel_data:/data/novels
      - upload_data:/data/uploads
    depends_on:
      - mysql
      - redis

  # ==================== Nginx（静态资源 + 反向代理）====================
  nginx:
    image: nginx:alpine
    container_name: nvs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - novel_data:/data/novels:ro
      - upload_data:/data/uploads:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - server

volumes:
  mysql_data:
  redis_data:
  novel_data:
  upload_data:
